<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — {{.ClubName}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --court:  #180a04;
      --panel:  rgba(32, 14, 6, 0.85);
      --border: rgba(194, 98, 45, 0.3);
      --accent: #c9e52a;
      --glow:   #f97316;
      --fg:     #faf5ee;
      --mid:    rgba(250, 245, 238, 0.72);
      --dim:    rgba(250, 245, 238, 0.50);
      --error:  #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--court);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 40px;
      background: rgba(20, 8, 3, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.05em;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: var(--accent);
    }

    .nav-logo svg {
      vertical-align: middle;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .club-name {
      font-size: 1.5em;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      color: var(--fg);
    }

    .club-hint {
      font-size: 0.92em;
      color: var(--mid);
      margin-bottom: 32px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.88em;
      color: var(--error);
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.82em;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(250, 245, 238, 0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 1em;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: rgba(201, 229, 42, 0.5);
      box-shadow: 0 0 0 3px rgba(201, 229, 42, 0.1);
    }

    .field input::placeholder {
      color: var(--dim);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--court);
      border: none;
      border-radius: 50px;
      font-size: 1em;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      opacity: 0.92;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .privacy {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.8em;
      color: var(--dim);
      line-height: 1.5;
    }

    .privacy::before {
      content: "🔒 ";
    }

    footer {
      margin-top: 40px;
      font-size: 0.82em;
      color: var(--dim);
    }

    footer a {
      color: var(--dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover {
      color: var(--fg);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px 32px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://tserve-labs.com" class="nav-logo" target="_blank">
      <svg width="22" height="22" viewBox="0 0 22 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="1" y1="5" x2="21" y2="5" stroke="white" stroke-width="4.7" stroke-linecap="round"/>
        <line x1="11" y1="5" x2="11" y2="22" stroke="white" stroke-width="4.7" stroke-linecap="round"/>
        <circle cx="9" cy="8" r="7" fill="#180a04"/>
        <circle cx="9" cy="8" r="7" stroke="#c9e52a" stroke-width="1.3" fill="none"/>
        <path d="M2 6 C10 0 8 16 16 10" stroke="#c9e52a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      </svg>
      TServe Labs
    </a>
  </nav>

  <div class="login-card">
    <h1 class="club-name">{{.ClubName}}</h1>
    <p class="club-hint">Sign in with your {{.ClubWebsite}} account</p>

    {{if .Error}}
    <div class="error-message">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/oauth/authorize">
      <input type="hidden" name="response_type" value="{{.ResponseType}}">
      <input type="hidden" name="client_id" value="{{.ClientID}}">
      <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
      <input type="hidden" name="state" value="{{.State}}">
      <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
      <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
      <input type="hidden" name="scope" value="{{.Scope}}">

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <p class="privacy">
      Your credentials are sent directly to {{.ClubShort}} for authentication.
      They are never sent to any AI or LLM and are not stored on this server.
    </p>
  </div>

  <footer>&copy; 2026 TServe Labs</footer>
</body>
</html>
